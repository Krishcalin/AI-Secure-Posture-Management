<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="40%" style="stop-color:#1a1035"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <!-- Accent gradient (purple-pink) -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <!-- Neural network node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <!-- Scanning line gradient -->
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Decorative orbs -->
  <circle cx="150" cy="80" r="120" fill="#6c5ce7" opacity="0.04"/>
  <circle cx="1050" cy="320" r="150" fill="#ec4899" opacity="0.04"/>
  <circle cx="600" cy="200" r="250" fill="#a855f7" opacity="0.02"/>

  <!-- Neural network connections (left side) -->
  <g opacity="0.15" stroke="#a855f7" stroke-width="1">
    <line x1="30" y1="60" x2="90" y2="120"/>
    <line x1="30" y1="140" x2="90" y2="120"/>
    <line x1="30" y1="220" x2="90" y2="200"/>
    <line x1="90" y1="120" x2="150" y2="160"/>
    <line x1="90" y1="200" x2="150" y2="160"/>
    <line x1="150" y1="160" x2="210" y2="140"/>
    <line x1="150" y1="160" x2="210" y2="200"/>
    <line x1="30" y1="300" x2="90" y2="280"/>
    <line x1="90" y1="280" x2="150" y2="240"/>
    <line x1="90" y1="280" x2="150" y2="320"/>
    <line x1="150" y1="320" x2="210" y2="280"/>
  </g>
  <g opacity="0.25">
    <circle cx="30" cy="60" r="3" fill="#a855f7"/>
    <circle cx="30" cy="140" r="3" fill="#a855f7"/>
    <circle cx="30" cy="220" r="3" fill="#6c5ce7"/>
    <circle cx="30" cy="300" r="3" fill="#6c5ce7"/>
    <circle cx="90" cy="120" r="4" fill="#a855f7"/>
    <circle cx="90" cy="200" r="3" fill="#a855f7"/>
    <circle cx="90" cy="280" r="4" fill="#6c5ce7"/>
    <circle cx="150" cy="160" r="4" fill="#a855f7"/>
    <circle cx="150" cy="240" r="3" fill="#6c5ce7"/>
    <circle cx="150" cy="320" r="3" fill="#6c5ce7"/>
    <circle cx="210" cy="140" r="3" fill="#a855f7"/>
    <circle cx="210" cy="200" r="3" fill="#a855f7"/>
    <circle cx="210" cy="280" r="3" fill="#6c5ce7"/>
  </g>

  <!-- Neural network connections (right side) -->
  <g opacity="0.15" stroke="#ec4899" stroke-width="1">
    <line x1="990" y1="80" x2="1050" y2="120"/>
    <line x1="990" y1="160" x2="1050" y2="120"/>
    <line x1="1050" y1="120" x2="1110" y2="90"/>
    <line x1="1050" y1="120" x2="1110" y2="160"/>
    <line x1="1110" y1="160" x2="1170" y2="140"/>
    <line x1="990" y1="240" x2="1050" y2="260"/>
    <line x1="990" y1="320" x2="1050" y2="260"/>
    <line x1="1050" y1="260" x2="1110" y2="240"/>
    <line x1="1050" y1="260" x2="1110" y2="310"/>
    <line x1="1110" y1="310" x2="1170" y2="280"/>
    <line x1="1110" y1="240" x2="1170" y2="280"/>
  </g>
  <g opacity="0.25">
    <circle cx="990" cy="80" r="3" fill="#ec4899"/>
    <circle cx="990" cy="160" r="3" fill="#ec4899"/>
    <circle cx="990" cy="240" r="3" fill="#ec4899"/>
    <circle cx="990" cy="320" r="3" fill="#ec4899"/>
    <circle cx="1050" cy="120" r="4" fill="#ec4899"/>
    <circle cx="1050" cy="260" r="4" fill="#ec4899"/>
    <circle cx="1110" cy="90" r="3" fill="#ec4899"/>
    <circle cx="1110" cy="160" r="3" fill="#ec4899"/>
    <circle cx="1110" cy="240" r="3" fill="#ec4899"/>
    <circle cx="1110" cy="310" r="3" fill="#ec4899"/>
    <circle cx="1170" cy="140" r="3" fill="#ec4899"/>
    <circle cx="1170" cy="280" r="3" fill="#ec4899"/>
  </g>

  <!-- Scanning line -->
  <rect x="0" y="198" width="1200" height="4" fill="url(#scanLine)" opacity="0.3"/>

  <!-- Central Shield with AI brain icon -->
  <g transform="translate(600, 155)" filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M 0 -65 L 45 -45 L 45 10 Q 45 55 0 75 Q -45 55 -45 10 L -45 -45 Z"
          fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <!-- Shield fill -->
    <path d="M 0 -60 L 40 -42 L 40 8 Q 40 50 0 68 Q -40 50 -40 8 L -40 -42 Z"
          fill="#6c5ce7" opacity="0.12"/>
    <!-- AI Brain icon inside shield -->
    <!-- Central circle -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.9"/>
    <!-- Brain connections -->
    <circle cx="0" cy="-28" r="5" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <circle cx="24" cy="-14" r="5" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <circle cx="24" cy="14" r="5" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="28" r="5" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.7"/>
    <circle cx="-24" cy="14" r="5" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.7"/>
    <circle cx="-24" cy="-14" r="5" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.7"/>
    <!-- Connection lines -->
    <line x1="0" y1="-12" x2="0" y2="-23" stroke="#a855f7" stroke-width="1.2" opacity="0.6"/>
    <line x1="10" y1="-6" x2="19" y2="-12" stroke="#a855f7" stroke-width="1.2" opacity="0.6"/>
    <line x1="10" y1="6" x2="19" y2="12" stroke="#ec4899" stroke-width="1.2" opacity="0.6"/>
    <line x1="0" y1="12" x2="0" y2="23" stroke="#ec4899" stroke-width="1.2" opacity="0.6"/>
    <line x1="-10" y1="6" x2="-19" y2="12" stroke="#ec4899" stroke-width="1.2" opacity="0.6"/>
    <line x1="-10" y1="-6" x2="-19" y2="-12" stroke="#6c5ce7" stroke-width="1.2" opacity="0.6"/>
    <!-- Central dot -->
    <circle cx="0" cy="0" r="3" fill="#a855f7" opacity="0.9"/>
  </g>

  <!-- Title text -->
  <text x="600" y="268" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#accent)" letter-spacing="2">
    AI-SPM
  </text>
  <text x="600" y="300" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#e6edf3" letter-spacing="4" opacity="0.9">
    AI SECURITY POSTURE MANAGEMENT
  </text>

  <!-- Subtitle -->
  <text x="600" y="335" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" letter-spacing="1">
    Static Analysis Scanner for AI/ML Projects
  </text>

  <!-- Bottom badges -->
  <g transform="translate(600, 368)">
    <!-- NIST AI RMF -->
    <g transform="translate(-220, 0)">
      <rect x="-55" y="-12" width="110" height="22" rx="11" fill="#6c5ce7" opacity="0.2" stroke="#6c5ce7" stroke-width="0.8" stroke-opacity="0.4"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" fill="#a78bfa" letter-spacing="0.5">NIST AI RMF</text>
    </g>
    <!-- EU AI Act -->
    <g transform="translate(-80, 0)">
      <rect x="-48" y="-12" width="96" height="22" rx="11" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.4"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" fill="#c084fc" letter-spacing="0.5">EU AI Act</text>
    </g>
    <!-- OWASP ML -->
    <g transform="translate(55, 0)">
      <rect x="-55" y="-12" width="110" height="22" rx="11" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.4"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" fill="#f472b6" letter-spacing="0.5">OWASP ML T10</text>
    </g>
    <!-- MITRE ATLAS -->
    <g transform="translate(195, 0)">
      <rect x="-55" y="-12" width="110" height="22" rx="11" fill="#6c5ce7" opacity="0.2" stroke="#6c5ce7" stroke-width="0.8" stroke-opacity="0.4"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" fill="#a78bfa" letter-spacing="0.5">MITRE ATLAS</text>
    </g>
  </g>

  <!-- Top-left floating code snippets -->
  <g opacity="0.12" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="10" fill="#a855f7">
    <text x="240" y="55">torch.load(weights_only=True)</text>
    <text x="260" y="75" fill="#ec4899">trust_remote_code=False</text>
    <text x="230" y="95">content_filter: enabled</text>
    <text x="270" y="340" fill="#6c5ce7">pickle.load() &#x2717;</text>
    <text x="240" y="360" fill="#ec4899">max_tokens: 4096 &#x2713;</text>
  </g>

  <!-- Top-right floating code snippets -->
  <g opacity="0.12" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="10" fill="#ec4899">
    <text x="800" y="55">guardrails: true</text>
    <text x="820" y="75" fill="#a855f7">safety_filter: BLOCK_HIGH</text>
    <text x="790" y="95">human_in_the_loop: true</text>
    <text x="810" y="340" fill="#6c5ce7">AISPM-MODEL-001 CRITICAL</text>
    <text x="780" y="360" fill="#a855f7">compliance: NIST-AI-RMF</text>
  </g>

  <!-- Top border accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <!-- Bottom border accent line -->
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>
</svg>
