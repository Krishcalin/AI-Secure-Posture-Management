<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="40%" style="stop-color:#1a1035"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <!-- Accent gradient (purple-pink) -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <!-- Title glow -->
    <filter id="titleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Shield glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <!-- Scanning line gradient -->
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Decorative orbs -->
  <circle cx="150" cy="80" r="140" fill="#6c5ce7" opacity="0.05"/>
  <circle cx="1050" cy="320" r="170" fill="#ec4899" opacity="0.05"/>
  <circle cx="600" cy="200" r="280" fill="#a855f7" opacity="0.03"/>

  <!-- Neural network connections (left side) -->
  <g opacity="0.18" stroke="#a855f7" stroke-width="1.2">
    <line x1="30" y1="60" x2="100" y2="120"/>
    <line x1="30" y1="150" x2="100" y2="120"/>
    <line x1="30" y1="240" x2="100" y2="210"/>
    <line x1="100" y1="120" x2="170" y2="165"/>
    <line x1="100" y1="210" x2="170" y2="165"/>
    <line x1="170" y1="165" x2="230" y2="140"/>
    <line x1="170" y1="165" x2="230" y2="210"/>
    <line x1="30" y1="320" x2="100" y2="290"/>
    <line x1="100" y1="290" x2="170" y2="250"/>
    <line x1="100" y1="290" x2="170" y2="330"/>
    <line x1="170" y1="330" x2="230" y2="290"/>
  </g>
  <g opacity="0.3">
    <circle cx="30" cy="60" r="4" fill="#a855f7"/>
    <circle cx="30" cy="150" r="4" fill="#a855f7"/>
    <circle cx="30" cy="240" r="3.5" fill="#6c5ce7"/>
    <circle cx="30" cy="320" r="3.5" fill="#6c5ce7"/>
    <circle cx="100" cy="120" r="5" fill="#a855f7"/>
    <circle cx="100" cy="210" r="4" fill="#a855f7"/>
    <circle cx="100" cy="290" r="5" fill="#6c5ce7"/>
    <circle cx="170" cy="165" r="5" fill="#a855f7"/>
    <circle cx="170" cy="250" r="4" fill="#6c5ce7"/>
    <circle cx="170" cy="330" r="4" fill="#6c5ce7"/>
    <circle cx="230" cy="140" r="4" fill="#a855f7"/>
    <circle cx="230" cy="210" r="4" fill="#a855f7"/>
    <circle cx="230" cy="290" r="4" fill="#6c5ce7"/>
  </g>

  <!-- Neural network connections (right side) -->
  <g opacity="0.18" stroke="#ec4899" stroke-width="1.2">
    <line x1="970" y1="80" x2="1040" y2="120"/>
    <line x1="970" y1="170" x2="1040" y2="120"/>
    <line x1="1040" y1="120" x2="1110" y2="90"/>
    <line x1="1040" y1="120" x2="1110" y2="165"/>
    <line x1="1110" y1="165" x2="1170" y2="140"/>
    <line x1="970" y1="250" x2="1040" y2="270"/>
    <line x1="970" y1="330" x2="1040" y2="270"/>
    <line x1="1040" y1="270" x2="1110" y2="250"/>
    <line x1="1040" y1="270" x2="1110" y2="320"/>
    <line x1="1110" y1="320" x2="1170" y2="290"/>
    <line x1="1110" y1="250" x2="1170" y2="290"/>
  </g>
  <g opacity="0.3">
    <circle cx="970" cy="80" r="4" fill="#ec4899"/>
    <circle cx="970" cy="170" r="4" fill="#ec4899"/>
    <circle cx="970" cy="250" r="3.5" fill="#ec4899"/>
    <circle cx="970" cy="330" r="3.5" fill="#ec4899"/>
    <circle cx="1040" cy="120" r="5" fill="#ec4899"/>
    <circle cx="1040" cy="270" r="5" fill="#ec4899"/>
    <circle cx="1110" cy="90" r="4" fill="#ec4899"/>
    <circle cx="1110" cy="165" r="4" fill="#ec4899"/>
    <circle cx="1110" cy="250" r="4" fill="#ec4899"/>
    <circle cx="1110" cy="320" r="4" fill="#ec4899"/>
    <circle cx="1170" cy="140" r="4" fill="#ec4899"/>
    <circle cx="1170" cy="290" r="4" fill="#ec4899"/>
  </g>

  <!-- Scanning line -->
  <rect x="0" y="195" width="1200" height="5" fill="url(#scanLine)" opacity="0.35"/>

  <!-- Central Shield with AI brain icon (scaled up 1.4x) -->
  <g transform="translate(600, 130)" filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M 0 -85 L 60 -58 L 60 14 Q 60 72 0 98 Q -60 72 -60 14 L -60 -58 Z"
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
    <!-- Shield fill -->
    <path d="M 0 -78 L 54 -53 L 54 11 Q 54 65 0 89 Q -54 65 -54 11 L -54 -53 Z"
          fill="#6c5ce7" opacity="0.12"/>
    <!-- AI Brain icon inside shield -->
    <!-- Central circle -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#a855f7" stroke-width="2.5" opacity="0.9"/>
    <!-- Brain connections -->
    <circle cx="0" cy="-38" r="7" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7"/>
    <circle cx="33" cy="-19" r="7" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7"/>
    <circle cx="33" cy="19" r="7" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="38" r="7" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.7"/>
    <circle cx="-33" cy="19" r="7" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.7"/>
    <circle cx="-33" cy="-19" r="7" fill="none" stroke="#6c5ce7" stroke-width="2" opacity="0.7"/>
    <!-- Connection lines -->
    <line x1="0" y1="-16" x2="0" y2="-31" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <line x1="14" y1="-8" x2="26" y2="-16" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <line x1="14" y1="8" x2="26" y2="16" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="16" x2="0" y2="31" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <line x1="-14" y1="8" x2="-26" y2="16" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <line x1="-14" y1="-8" x2="-26" y2="-16" stroke="#6c5ce7" stroke-width="1.5" opacity="0.6"/>
    <!-- Central dot -->
    <circle cx="0" cy="0" r="4" fill="#a855f7" opacity="0.9"/>
  </g>

  <!-- Title text — oversized and bold -->
  <text x="600" y="272" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="url(#accent)" letter-spacing="6" filter="url(#titleGlow)">
    AI-SPM
  </text>

  <!-- Subtitle — prominent -->
  <text x="600" y="310" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#e6edf3" letter-spacing="6" opacity="0.95">
    AI SECURITY POSTURE MANAGEMENT
  </text>

  <!-- Tagline -->
  <text x="600" y="342" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#8b949e" letter-spacing="2">
    Static Analysis Scanner for AI/ML Projects
  </text>

  <!-- Bottom badges (larger) -->
  <g transform="translate(600, 376)">
    <!-- NIST AI RMF -->
    <g transform="translate(-240, 0)">
      <rect x="-66" y="-14" width="132" height="26" rx="13" fill="#6c5ce7" opacity="0.2" stroke="#6c5ce7" stroke-width="1" stroke-opacity="0.5"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" letter-spacing="0.5">NIST AI RMF</text>
    </g>
    <!-- EU AI Act -->
    <g transform="translate(-85, 0)">
      <rect x="-58" y="-14" width="116" height="26" rx="13" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#c084fc" letter-spacing="0.5">EU AI Act</text>
    </g>
    <!-- OWASP ML -->
    <g transform="translate(70, 0)">
      <rect x="-66" y="-14" width="132" height="26" rx="13" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1" stroke-opacity="0.5"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#f472b6" letter-spacing="0.5">OWASP ML T10</text>
    </g>
    <!-- MITRE ATLAS -->
    <g transform="translate(225, 0)">
      <rect x="-66" y="-14" width="132" height="26" rx="13" fill="#6c5ce7" opacity="0.2" stroke="#6c5ce7" stroke-width="1" stroke-opacity="0.5"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" letter-spacing="0.5">MITRE ATLAS</text>
    </g>
  </g>

  <!-- Top-left floating code snippets (slightly larger) -->
  <g opacity="0.14" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#a855f7">
    <text x="250" y="52">torch.load(weights_only=True)</text>
    <text x="270" y="74" fill="#ec4899">trust_remote_code=False</text>
    <text x="240" y="96">content_filter: enabled</text>
    <text x="275" y="340" fill="#6c5ce7">pickle.load() &#x2717;</text>
    <text x="248" y="360" fill="#ec4899">max_tokens: 4096 &#x2713;</text>
  </g>

  <!-- Top-right floating code snippets (slightly larger) -->
  <g opacity="0.14" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#ec4899">
    <text x="790" y="52">guardrails: true</text>
    <text x="810" y="74" fill="#a855f7">safety_filter: BLOCK_HIGH</text>
    <text x="780" y="96">human_in_the_loop: true</text>
    <text x="800" y="340" fill="#6c5ce7">AISPM-MODEL-001 CRITICAL</text>
    <text x="770" y="360" fill="#a855f7">compliance: NIST-AI-RMF</text>
  </g>

  <!-- Top border accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Bottom border accent line -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#accent)"/>
</svg>
